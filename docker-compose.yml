services:
  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── Forge API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Forge Worker (Email) ──────────────────────────────────────────────────
  worker-email:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CONCURRENCY=5
      - QUEUE_NAME=send_email
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Forge Worker (Image) ──────────────────────────────────────────────────
  worker-image:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CONCURRENCY=5
      - QUEUE_NAME=resize_image
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Forge Worker (Report) ─────────────────────────────────────────────────
  worker-report:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - CONCURRENCY=5
      - QUEUE_NAME=generate_report
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Forge Dashboard ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis-data:
